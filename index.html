<script>
'use strict';

// ===== Config =====
const SENSITIVE_WORDS = ['idiot', 'stupid', 'shizinping'];
const MODERATION_DELAY_MS = 2000;   // ~2s 모더레이션 호출
const TOAST_DURATION_MS  = 2000;
const AI_TYPING_DELAY_MS = 600;     // 응답 시작 전 대기
const AI_RESPONSE_MS     = 1700;    // typing dots 노출 시간

// 추천답변(받은 메시지마다 자동 생성)
const RECOMMEND_OPTIONS = [
  { dim: 'With a fierce scowl, he growled, ', text: 'Meow Punch!' },
  { text: 'Meow Punch!' },
  { text: 'Meow Punch! Meow Punch! Meow!' }
];

// AI(=Blandford)가 보낼 가능한 응답들
const AI_RESPONSES = [
  'Indeed... your words echo in this empty hall.',
  'A curious thing to say, traveler.',
  'Hmm. Tell me more of your tale.',
  'The wind carries your voice, but not your meaning.',
  'You speak as one who has seen the abyss.'
];

// ===== State =====
let messages = [
  { id: 1, type: 'received', name: 'Blandford Jack Forward',
    text: "You’ve lost your way, traveler." }
];
let nextId = 2;
let busy = false;

// ===== DOM =====
const chatArea   = document.getElementById('chatArea');
const input      = document.getElementById('msgInput');
const sendBtn    = document.getElementById('sendBtn');
const toastLayer = document.getElementById('toast-layer');

// ===== Helpers =====
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
  ));
}

function isModerated(text) {
  const lower = text.toLowerCase();
  return SENSITIVE_WORDS.some(w => lower.includes(w));
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function showToast(text) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<div class="icon"></div><div class="text"></div>`;
  t.querySelector('.text').textContent = text;
  toastLayer.appendChild(t);
  setTimeout(() => {
    t.classList.add('out');
    setTimeout(() => t.remove(), 200);
  }, TOAST_DURATION_MS);
}

// ===== Render =====
function render() {
  // Build new HTML for chat area
  chatArea.innerHTML = `
    <div class="notice-outer">
      <div class="notice">
        <p>All messages sent by the character are generated messages.</p>
      </div>
    </div>
  `;

  messages.forEach(m => {
    if (m.type === 'received') {
      const el = document.createElement('div');
      el.className = 'msg-received';
      const inner = m.typing
        ? `<div class="typing"><span class="d"></span><span class="d"></span><span class="d"></span></div>`
        : `<p>${escapeHtml(m.text)}</p>`;
      el.innerHTML = `
        <div class="msg-avatar"><img src="assets/profile2.png" alt=""></div>
        <div class="msg-body">
          <div class="msg-name">${escapeHtml(m.name || 'Blandford Jack Forward')}</div>
          <div class="msg-bubble-recv">${inner}</div>
        </div>`;
      chatArea.appendChild(el);
    } else if (m.type === 'sent') {
      const el = document.createElement('div');
      el.className = 'msg-sent';
      const spinner = `
        <div class="loading-spinner" aria-hidden="true">
          <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.996 0.7C5.75 0.7 4.532 1.071 3.496 1.764C2.46 2.457 1.655 3.437 1.179 4.592C0.703 5.74 0.577 7.007 0.822 8.232C1.067 9.457 1.662 10.577 2.544 11.459C3.426 12.341 4.546 12.943 5.771 13.181C6.996 13.426 8.263 13.3 9.411 12.824C10.559 12.348 11.546 11.543 12.239 10.507C12.932 9.471 13.303 8.253 13.303 7.007"
              stroke="white" stroke-opacity="0.6" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>`;
      el.innerHTML = `
        <div class="msg-bubble-sent">
          <p>${escapeHtml(m.text)}</p>
          ${m.status === 'pending' ? spinner : ''}
        </div>`;
      chatArea.appendChild(el);
    }
  });

  // 추천답변: 마지막이 received(타이핑 아님)일 때만 노출
  const last = messages[messages.length - 1];
  if (last && last.type === 'received' && !last.typing) {
    const rec = document.createElement('div');
    rec.className = 'recommend';
    rec.innerHTML = `
      <div class="recommend-header">
        <div class="recommend-header-inner">
          <div class="icon"><img src="assets/sparkle.svg" alt=""></div>
          <div class="label">Recommended chat</div>
        </div>
      </div>
      ${RECOMMEND_OPTIONS.map((o, i) => `
        <div class="recommend-option">
          <button data-idx="${i}">${
            o.dim ? `<span class="dim">${escapeHtml(o.dim)}</span>` : ''
          }<span>${escapeHtml(o.text)}</span></button>
        </div>
      `).join('')}
    `;
    chatArea.appendChild(rec);

    rec.querySelectorAll('button[data-idx]').forEach(btn => {
      btn.addEventListener('click', () => {
        const o = RECOMMEND_OPTIONS[+btn.dataset.idx];
        const composed = ((o.dim || '') + o.text).trim();
        sendMessage(composed);
      });
    });
  }

  // Auto scroll to bottom
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

// ===== Send =====
function sendMessage(rawText) {
  if (busy) return;
  const text = (rawText || '').trim();
  if (!text) return;

  busy = true;
  input.value = '';
  input.blur();
  syncSendActive();

  const myId = nextId++;
  messages.push({ id: myId, type: 'sent', text, status: 'pending' });
  render();

  // ~2초 모더레이션 호출
  setTimeout(() => {
    if (isModerated(text)) {
      // 차단: 메시지 UI/히스토리에서 완전 삭제
      messages = messages.filter(x => x.id !== myId);
      render(); // 마지막이 다시 received → 추천답변 자동 재노출
      showToast('Change the subject');
      busy = false;
      return;
    }

    // 통과: pending 해제 → AI 응답 시작
    const sent = messages.find(x => x.id === myId);
    if (sent) sent.status = 'sent';
    render();

    setTimeout(() => {
      const respId = nextId++;
      messages.push({
        id: respId, type: 'received',
        name: 'Blandford Jack Forward',
        typing: true
      });
      render();

      setTimeout(() => {
        const r = messages.find(x => x.id === respId);
        if (r) {
          r.typing = false;
          r.text = pick(AI_RESPONSES);
        }
        render();
        busy = false;
      }, AI_RESPONSE_MS);
    }, AI_TYPING_DELAY_MS);
  }, MODERATION_DELAY_MS);
}

// ===== Bindings =====
function syncSendActive() {
  if (input.value.trim().length > 0) sendBtn.classList.add('active');
  else sendBtn.classList.remove('active');
}
sendBtn.addEventListener('click', () => sendMessage(input.value));
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.isComposing) {
    e.preventDefault();
    sendMessage(input.value);
  }
});
input.addEventListener('input', syncSendActive);
syncSendActive();

// Initial render
render();

// ===== Demo helpers (URL: ?demo=pending|blocked|toast|typing|response) =====
const params = new URLSearchParams(location.search);
const demo = params.get('demo');
if (demo) {
  // bypass busy guard for snapshot demos
  setTimeout(() => {
    if (demo === 'pending' || demo === 'toast' || demo === 'blocked') {
      // Show user msg in pending state
      messages.push({ id: 99, type: 'sent', text: 'shizinping idiot', status: 'pending' });
      render();
      if (demo === 'toast') {
        showToast('Change the subject');
      }
      if (demo === 'blocked') {
        // After block: msg removed + toast + recommend re-shown
        messages = messages.filter(x => x.id !== 99);
        render();
        showToast('Change the subject');
      }
    } else if (demo === 'typing') {
      messages.push({ id: 99, type: 'sent', text: 'Sexyfood' });
      messages.push({ id: 100, type: 'received', name: 'Blandford Jack Forward', typing: true });
      render();
    } else if (demo === 'response') {
      messages.push({ id: 99, type: 'sent', text: 'Sexyfood' });
      messages.push({ id: 100, type: 'received', name: 'Blandford Jack Forward', text: 'A curious thing to say, traveler.' });
      render();
    } else if (demo === 'typed') {
      // input has typed text (not sent)
      input.value = 'shizinping idiot';
      input.focus();
      syncSendActive();
    }
  }, 50);
}
</script>
