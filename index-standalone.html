<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=393, initial-scale=1, user-scalable=no">
<title>Zaizai · 캐릭터챗 모더레이션 프로토타입</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #2a2a2e;
    font-family: -apple-system, "SF Pro Text", BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  @media (min-width: 500px) {
    body { padding: 20px 0; }
  }

  .frame {
    width: 393px;
    height: 852px;
    background: #ffffff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
    border-radius: 0;
  }

  /* ============== Status Bar (44px) ============== */
  .status-bar {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 44px;
    background: #ffffff;
    z-index: 10;
  }
  .status-time {
    position: absolute;
    left: 21px; top: 14.33px;
    width: 54px; height: 18px;
    line-height: 18px;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: #000;
    letter-spacing: -0.3px;
    font-family: -apple-system, "SF Pro Text", sans-serif;
  }
  .status-icons {
    position: absolute;
    right: 14.34px; top: 17.33px;
    height: 11.333px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .status-icons img { display: block; }
  .status-icons .cell { width: 17px; height: 10.667px; }
  .status-icons .wifi { width: 15.333px; height: 11px; }
  .status-icons .battery { width: 24.328px; height: 11.333px; }

  /* ============== Navigation Bar (52px, top 44) ============== */
  .nav {
    position: absolute; top: 44px; left: 0;
    width: 100%; height: 52px;
    background: #ffffff;
    z-index: 10;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .nav-left {
    display: flex; align-items: center;
    flex: 1 1 auto;
    min-width: 0;
  }
  .nav-back {
    width: 24px; height: 24px;
    margin: 14px 0 14px 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .nav-back img { width: 22px; height: 16px; display: block; }
  .nav-profile-wrap {
    display: flex; align-items: center;
    gap: 10px;
    margin-left: 16px;
    min-width: 0;
    flex: 1 1 auto;
  }
  .nav-profile {
    width: 34px; height: 34px;
    border-radius: 50%;
    overflow: hidden;
    background: #ffff69;
    flex-shrink: 0;
  }
  .nav-profile img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .nav-title-row {
    display: flex;
    align-items: center;
    gap: 2px;
    min-width: 0;
    max-width: 220px;
  }
  .nav-title {
    font-family: -apple-system, "SF Pro Text", sans-serif;
    font-weight: 600;
    font-size: 15px;
    line-height: 18px;
    color: #292930;
    max-width: 201px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .nav-chevron {
    width: 12px; height: 12px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-chevron svg {
    width: 8.036px;
    height: 4.018px;
    display: block;
    transform: rotate(-90deg);
  }
  .nav-menu {
    width: 24px; height: 24px;
    margin: 14px 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .nav-menu img { width: 20px; height: 16px; display: block; }

  /* ============== Notice (scrolls with chat) ============== */
  .notice-outer {
    width: 100%;
    padding: 4px 12px 0 12px;
    margin-bottom: 20px;
    flex-shrink: 0;
    background: transparent;
  }
  .notice {
    background: #F8F8FA;
    border-radius: 8px;
    height: 36px;
    display: flex; align-items: center; justify-content: center;
    padding: 10px 16px;
  }
  .notice p {
    font-family: -apple-system, "SF Pro Text", sans-serif;
    font-weight: 400;
    font-size: 11px;
    line-height: 16px;
    color: #99999C;
    text-align: center;
  }

  /* ============== Chat Area (top 96, height 409 — Notice scrolls inside) ============== */
  .chat-area {
    position: absolute;
    top: 96px;
    left: 0; right: 0;
    height: 409px;
    overflow-y: auto;
    overflow-x: hidden;
    padding-top: 0;
    padding-bottom: 8px;
    display: flex;
    flex-direction: column;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 0; display: none; }

  /* ---- Received message ---- */
  .msg-received {
    display: flex;
    gap: 8px;
    padding-left: 11px;
    padding-right: 11px;
    align-items: flex-start;
    margin-top: 0;
    margin-bottom: 0;
  }
  .msg-received + .msg-received,
  .msg-sent + .msg-received {
    margin-top: 16px;
  }
  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: #ab69ff;
  }
  .msg-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .msg-body {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }
  .msg-name {
    font-family: -apple-system, "SF Pro Text", sans-serif;
    font-weight: 500;
    font-size: 12px;
    line-height: 16px;
    color: #5C5C61;
    max-width: 240px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .msg-bubble-recv {
    background: #F5F5F6;
    border-radius: 18px;
    padding: 9px 14px;
    max-width: 260px;
    display: inline-flex;
    align-items: flex-start;
  }
  .msg-bubble-recv p {
    font-family: -apple-system, "SF Pro Text", sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 20px;
    color: #292930;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ---- Typing dots in received bubble ---- */
  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    height: 20px;
    width: 30px;
    justify-content: space-between;
  }
  .typing .d {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #C7C7C9;
    animation: typing 1.4s infinite ease-in-out;
  }
  .typing .d:nth-child(2) { animation-delay: .2s; background: #C7C7C9; }
  .typing .d:nth-child(3) { animation-delay: .4s; background: #E0E0E1; }
  @keyframes typing {
    0%, 60%, 100% { opacity: .35; transform: translateY(0); }
    30%          { opacity: 1;   transform: translateY(-2px); }
  }

  /* ---- Sent message (user) ---- */
  .msg-sent {
    display: flex;
    justify-content: flex-end;
    padding-right: 10px;
    margin-top: 8px;
  }
  .msg-bubble-sent {
    background: #5C46FF;
    border-radius: 18px;
    padding: 9px 14px;
    max-width: 260px;
    display: inline-flex;
    gap: 8px;
    align-items: center;
    justify-content: flex-end;
  }
  .msg-bubble-sent p {
    font-family: -apple-system, "SF Pro Text", sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 20px;
    color: #ffffff;
    word-break: break-word;
  }
  .loading-spinner {
    width: 14px; height: 14px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    animation: spin 1s linear infinite;
  }
  .loading-spinner svg { width: 14px; height: 14px; display: block; }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ============== Recommended Chat ============== */
  .recommend {
    align-self: flex-end;
    width: 280px;
    background: #ffffff;
    margin-top: 20px;
    display: flex;
    flex-direction: column;
  }
  .recommend-header {
    display: flex;
    align-items: center;
    padding: 10px 18px 2px 10px;
  }
  .recommend-header-inner {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 8px;
  }
  .recommend-header .icon {
    width: 12px; height: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .recommend-header .icon img { width: 13.2px; height: 13.2px; display: block; }
  .recommend-header .label {
    font-family: -apple-system, "SF Pro Text", sans-serif;
    font-weight: 600;
    font-size: 12px;
    line-height: 16px;
    color: #292930;
  }
  .recommend-option {
    display: flex;
    padding: 4px 10px;
  }
  .recommend-option button {
    background: rgba(92, 70, 255, 0.05);
    border: 1px solid rgba(92, 70, 255, 0.12);
    border-radius: 18px;
    padding: 9px 14px;
    width: 260px;
    text-align: left;
    cursor: pointer;
    font-family: -apple-system, "SF Pro Text", sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 20px;
    color: #5C46FF;
    transition: background .15s ease;
  }
  .recommend-option button:hover { background: rgba(92, 70, 255, 0.10); }
  .recommend-option button:active { background: rgba(92, 70, 255, 0.18); }
  .recommend-option .dim { color: rgba(92, 70, 255, 0.6); }

  /* ============== Input Field (top 505, h 56) ============== */
  .input-area {
    position: absolute;
    top: 505px; left: 0;
    width: 100%; height: 56px;
    background: #ffffff;
    padding: 8px 12px;
    z-index: 6;
  }
  .input-row {
    display: flex; align-items: center; gap: 12px;
    width: 100%;
  }
  .input-pill {
    flex: 1 1 0;
    background: #F5F5F6;
    border-radius: 100px;
    height: 40px;
    display: flex;
    align-items: center;
    padding: 10px 12px 10px 16px;
    gap: 12px;
    overflow: hidden;
    min-width: 0;
  }
  .input-pill input {
    flex: 1 1 0;
    border: none;
    background: transparent;
    outline: none;
    font-family: -apple-system, "SF Pro Text", sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 20px;
    color: #292930;
    caret-color: #5C46FF;
    min-width: 0;
    padding: 0;
  }
  .input-pill input::placeholder { color: #99999C; }
  .input-asterisk {
    width: 16px; height: 16px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .input-asterisk img { width: 10.392px; height: 12px; display: block; }
  .input-send {
    width: 26px; height: 26px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    background: none; border: none; padding: 0;
    color: #C7C7C9;
    transition: color .12s ease;
  }
  .input-send svg { width: 100%; height: 100%; display: block; }
  .input-send svg path { fill: currentColor; }
  .input-send.active { color: #5C46FF; }
  .input-send:disabled { opacity: .5; cursor: not-allowed; }

  /* ============== Home Indicator (bottom, h 34, w 375 centered) ============== */
  .home-indicator {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 375px; height: 34px;
    z-index: 7;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 9px;
    pointer-events: none;
  }
  .home-indicator .bar {
    width: 134px; height: 5px;
    background: #000;
    border-radius: 100px;
  }

  /* ============== Toast (top, Comp/Toast Error+Fail) ============== */
  #toast-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 50;
  }
  .toast {
    position: absolute;
    top: 52px;
    left: 12px;
    width: 369px;
    height: 52px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
    font-family: -apple-system, "SF Pro Text", sans-serif;
    animation: toast-in .22s cubic-bezier(.2,.7,.3,1);
  }
  .toast.out { animation: toast-out .2s ease-in forwards; }
  .toast .icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #FB3559;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .toast .icon::before {
    content: '';
    width: 2px;
    height: 8px;
    background: #ffffff;
    border-radius: 1px;
    box-shadow: 0 6px 0 0 #ffffff;
  }
  .toast .text {
    font-weight: 500;
    font-size: 14px;
    line-height: 18px;
    color: #292930;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes toast-out {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-8px); }
  }

  /* Caption under the frame */
  .caption {
    position: fixed;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    color: #888;
    font-family: -apple-system, sans-serif;
    font-size: 11px;
    text-align: center;
    pointer-events: none;
  }
</style>
</head>

  ));
}

function isModerated(text) {
  const lower = text.toLowerCase();
  return SENSITIVE_WORDS.some(w => lower.includes(w));

  const t = document.createElement('div');

// ===== Send =====
function sendMessage(rawText) {
  if (busy) return;
  const text = (rawText || '').trim();
  if (!text) return;

  busy = true;
  input.value = '';
  input.blur();
  syncSendActive();

  const myId = nextId++;
  messages.push({ id: myId, type: 'sent', text, status: 'pending' });
  render();

  // ~2초 모더레이션 호출
  setTimeout(() => {
    if (isModerated(text)) {
      // 차단: 메시지 UI/히스토리에서 완전 삭제
      messages = messages.filter(x => x.id !== myId);
      render(); // 마지막이 다시 received → 추천답변 자동 재노출
      showToast('Change the subject');
      busy = false;
      return;
    }

    // 통과: pending 해제 → AI 응답 시작
    const sent = messages.find(x => x.id === myId);
    if (sent) sent.status = 'sent';
    render();

    setTimeout(() => {
      const respId = nextId++;
      messages.push({
        id: respId, type: 'received',
        name: 'Blandford Jack Forward',
        typing: true
      });
      render();

      setTimeout(() => {
        const r = messages.find(x => x.id === respId);
        if (r) {
          r.typing = false;
          r.text = pick(AI_RESPONSES);
        }
        render();
        busy = false;
      }, AI_RESPONSE_MS);
    }, AI_TYPING_DELAY_MS);
  }, MODERATION_DELAY_MS);
}

// ===== Bindings =====
function syncSendActive() {
  if (input.value.trim().length > 0) sendBtn.classList.add('active');
  else sendBtn.classList.remove('active');
}
sendBtn.addEventListener('click', () => sendMessage(input.value));
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.isComposing) {
    e.preventDefault();
    sendMessage(input.value);
  }
});
input.addEventListener('input', syncSendActive);
syncSendActive();

// Initial render
render();

// ===== Demo helpers (URL: ?demo=pending|blocked|toast|typing|response) =====
const params = new URLSearchParams(location.search);
const demo = params.get('demo');
if (demo) {
  // bypass busy guard for snapshot demos
  setTimeout(() => {
    if (demo === 'pending' || demo === 'toast' || demo === 'blocked') {
      // Show user msg in pending state
      messages.push({ id: 99, type: 'sent', text: 'shizinping idiot', status: 'pending' });
      render();
      if (demo === 'toast') {
        showToast('Change the subject');
      }
      if (demo === 'blocked') {
        // After block: msg removed + toast + recommend re-shown
        messages = messages.filter(x => x.id !== 99);
        render();
        showToast('Change the subject');
      }
    } else if (demo === 'typing') {
      messages.push({ id: 99, type: 'sent', text: 'Sexyfood' });
      messages.push({ id: 100, type: 'received', name: 'Blandford Jack Forward', typing: true });
      render();
    } else if (demo === 'response') {
      messages.push({ id: 99, type: 'sent', text: 'Sexyfood' });
      messages.push({ id: 100, type: 'received', name: 'Blandford Jack Forward', text: 'A curious thing to say, traveler.' });
      render();
    } else if (demo === 'typed') {
      // input has typed text (not sent)
      input.value = 'shizinping idiot';
      input.focus();
      sendBtn.classList.add('active');
    }
  }, 50);
}
